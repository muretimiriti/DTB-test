# Helm values for kube-prometheus-stack (chart 69.x)
# Applied by: helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#               -n monitoring --create-namespace -f manifests/observability/prometheus-values.yaml
#
# observability-init.sh reads this file directly — no changes needed to the script.

# ── Global ─────────────────────────────────────────────────────────────────────
fullnameOverride: prometheus

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: ""   # Set via Vault / ESO — do NOT hardcode here
  persistence:
    enabled: true
    storageClassName: standard-rwo
    size: 2Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  # Pre-import community dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus

# ── Prometheus ─────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    # Scrape all PodMonitors and ServiceMonitors regardless of namespace label
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

# ── Alertmanager ───────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ── Node exporter ──────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ─────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
