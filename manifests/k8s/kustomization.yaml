
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: banking

resources:

  - namespace.yaml
  - network-policy.yaml

  - mongodb/configmap.yaml
  - mongodb/external-secret.yaml
  - mongodb/statefulset.yaml
  - mongodb/service.yaml
  - mongodb/pdb.yaml

  - backend/configmap.yaml
  - backend/external-secret.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - backend/pdb.yaml

  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/ingress.yaml
  - frontend/hpa.yaml
  - frontend/pdb.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: dtb-banking-portal
      managed-by: kustomize

images:
  # Tags are pinned by the Tekton update-manifests task on every build.
  # The 'name:' key must match exactly what kustomize edit set image uses
  # (and what Kaniko pushes to Docker Hub).
  # Do NOT manually set these to "latest" — that breaks GitOps immutability.
  - name: muretimiriti/dtb-project-backend
    newName: muretimiriti/dtb-project-backend
    newTag: replace-me
  - name: muretimiriti/dtb-project-frontend
    newName: muretimiriti/dtb-project-frontend
    newTag: replace-me
