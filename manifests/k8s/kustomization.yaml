
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: banking

resources:
  
  - namespace.yaml

  - mongodb/configmap.yaml
  - mongodb/secret.yaml
  - mongodb/statefulset.yaml
  - mongodb/service.yaml

  - backend/configmap.yaml
  - backend/secret.yaml
  - backend/deployment.yaml
  - backend/service.yaml

  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: dtb-banking-portal
      managed-by: kustomize

images:
  - name: DOCKERHUB_USERNAME/banking-backend
    newName: DOCKERHUB_USERNAME/banking-backend   
    newTag: latest
  - name: DOCKERHUB_USERNAME/banking-frontend
    newName: DOCKERHUB_USERNAME/banking-frontend  
    newTag: latest
