
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-backend
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     

  template:
    metadata:
      labels:
        app.kubernetes.io/name: banking-backend
        app.kubernetes.io/part-of: dtb-banking-portal
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "latest"
      annotations:
        
        checksum/config: "placeholder-updated-by-pipeline"

    spec:
      
        runAsNonRoot: true
        runAsUser: 1001     
        runAsGroup: 1001
        fsGroup: 1001

      
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb-0.mongodb-headless.banking.svc.cluster.local 27017; do
                echo "Waiting for MongoDB..."; sleep 3
              done
              echo "MongoDB is ready."
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"

      containers:
        - name: backend
          
          image: DOCKERHUB_USERNAME/banking-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

         
          envFrom:
            - configMapRef:
                name: backend-config

          
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: MONGO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGO_APP_PASSWORD
            
            - name: MONGODB_URI
              value: >-
                mongodb://$(MONGO_APP_USER):$(MONGO_APP_PASSWORD)@$(MONGODB_HOST):$(MONGODB_PORT)/$(MONGO_DB_NAME)?authSource=$(MONGO_DB_NAME)

          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12   

          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

         
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      
      imagePullSecrets:
        - name: regcred

      
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: banking-backend
