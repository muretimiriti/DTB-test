---
# HorizontalPodAutoscaler — scales the backend between 2 and 6 replicas based on
# CPU and memory utilisation.  The base kustomization sets 2 replicas; the HPA
# takes over from there at runtime.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-backend
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-backend

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cooldown prevents flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
