apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_APP_USER: "app_user"
  MONGO_DB_NAME: "banking_db"

  # Replica-set connection string — hits all three nodes with automatic failover.
  # Format: mongodb://user:pass@host1,host2,host3/db?replicaSet=rs0&authSource=db
  # The password is injected at runtime from the backend-secret ExternalSecret.
  MONGODB_HOST: "mongodb-0.mongodb-headless.banking.svc.cluster.local:27017,mongodb-1.mongodb-headless.banking.svc.cluster.local:27017,mongodb-2.mongodb-headless.banking.svc.cluster.local:27017"
  MONGODB_REPLICA_SET: "rs0"
  MONGODB_PORT: "27017"

  # Application tuning — these are config values not secrets.
  JWT_EXPIRES_IN: "1h"
  BCRYPT_ROUNDS: "12"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  AUTH_RATE_LIMIT_MAX: "5"

  # ALLOWED_ORIGINS — no localhost in production.
  # Each environment overlay patches this to the correct ingress domain.
  # Dev:     https://banking-dev.yourdomain.com
  # Staging: https://banking-staging.yourdomain.com
  # Prod:    https://banking.yourdomain.com
  ALLOWED_ORIGINS: "https://banking.yourdomain.com"
