# =============================================================================
# backend/configmap.yaml — Non-sensitive backend configuration
#
# Sensitive values (JWT_SECRET, MONGODB_URI) live in backend/secret.yaml
# and are managed by External Secrets Operator in the pipeline.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_APP_USER: "app_user"
  MONGO_DB_NAME: "banking_db"
  # StatefulSet pod-0 DNS: mongodb-0.mongodb-headless.banking.svc.cluster.local
  MONGODB_HOST: "mongodb-0.mongodb-headless.banking.svc.cluster.local"
  MONGODB_PORT: "27017"
  JWT_EXPIRES_IN: "1h"
  BCRYPT_ROUNDS: "12"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  AUTH_RATE_LIMIT_MAX: "5"
  # Frontend service DNS — used for CORS allowed origins
  ALLOWED_ORIGINS: "http://banking-frontend.banking.svc.cluster.local,http://localhost:3000"
