# =============================================================================
# backend/secret.yaml — Backend sensitive credentials (TEMPLATE)
#
# !! DO NOT commit real values. !!
# In the pipeline, this Secret is managed by External Secrets Operator (ESO),
# pulling from Vault. This file is a reference template only.
#
# To apply manually for local testing:
#   kubectl create secret generic backend-secret \
#     --from-literal=JWT_SECRET=$(openssl rand -hex 64) \
#     --from-literal=MONGO_APP_PASSWORD=<strong-password> \
#     -n banking
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: backend
  annotations:
    managed-by: external-secrets
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_64_CHAR_RANDOM_STRING"   # REPLACE: openssl rand -hex 64
  MONGO_APP_PASSWORD: "CHANGE_ME_APP"              # REPLACE or use ESO
