---
# PodDisruptionBudget — guarantees at least 1 frontend pod remains available
# during voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-frontend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-frontend
      app.kubernetes.io/component: frontend
