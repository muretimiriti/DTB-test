# =============================================================================
# frontend/deployment.yaml — React 18 + Nginx Frontend Deployment
#
# Nginx is configured (via nginx.conf in the image) to:
#   - Serve the React SPA on /
#   - Proxy /api/* to the backend ClusterIP service
#
# Image: built by the Tekton pipeline and pushed to Docker Hub.
# Replace DOCKERHUB_USERNAME with your actual Docker Hub username,
# or let the pipeline substitute it via Kustomize/envsubst.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-frontend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-frontend
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero-downtime rollouts

  template:
    metadata:
      labels:
        app.kubernetes.io/name: banking-frontend
        app.kubernetes.io/part-of: dtb-banking-portal
        app.kubernetes.io/component: frontend
        app.kubernetes.io/version: "latest"
      annotations:
        checksum/config: "placeholder-updated-by-pipeline"

    spec:
      # ── Security: run as non-root nginx ──────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 101      # nginx user in the Alpine image
        runAsGroup: 101
        fsGroup: 101

      # ── Wait for backend to be ready ─────────────────────────────────────
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z banking-backend.banking.svc.cluster.local 5000; do
                echo "Waiting for backend..."; sleep 3
              done
              echo "Backend is ready."
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"

      containers:
        - name: frontend
          # Pipeline replaces DOCKERHUB_USERNAME and IMAGE_TAG at build time
          image: DOCKERHUB_USERNAME/banking-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # ── Probes ────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          # ── Resources ─────────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # ── Security context ──────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # ── Nginx writable paths (matches docker-compose tmpfs) ────────
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      # ── Image pull secret ──────────────────────────────────────────────
      imagePullSecrets:
        - name: regcred

      # ── Spread replicas across nodes ───────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: banking-frontend
