# =============================================================================
# frontend/service.yaml — Frontend ClusterIP Service
#
# Exposes Nginx on port 80 inside the cluster.
# External access is handled by the Ingress (ingress.yaml).
# DNS: banking-frontend.banking.svc.cluster.local:80
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-frontend
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: banking-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
