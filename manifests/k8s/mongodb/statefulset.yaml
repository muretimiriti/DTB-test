# =============================================================================
# mongodb/statefulset.yaml — MongoDB 7.0 StatefulSet
#
# StatefulSet (vs Deployment) gives stable network identity and ordered
# pod management — critical for databases.
#
# Apply order: namespace → secret → configmap → statefulset → service
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: banking
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "7.0"
spec:
  serviceName: mongodb-headless   # must match the headless service name
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: dtb-banking-portal
        app.kubernetes.io/component: database
        app.kubernetes.io/version: "7.0"
    spec:
      # ── Security: run as non-root ────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 999      # mongodb official image user
        runAsGroup: 999
        fsGroup: 999

      # ── Init: ensure data dir is owned correctly ─────────────────────────
      initContainers:
        - name: fix-data-dir-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /data/db /data/configdb"]
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /data/configdb
          securityContext:
            runAsUser: 0       # needs root only for this init step

      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP

          # ── Environment — credentials from Secret ──────────────────────
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: "banking_db"
            - name: MONGO_APP_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_APP_USER
            - name: MONGO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_APP_PASSWORD

          # ── Initialisation script (runs once on first start) ───────────
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /data/configdb
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/mongo-init.js
              subPath: mongo-init.js
              readOnly: true

          # ── Probes ────────────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Resources ─────────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ── Security context ──────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false    # MongoDB needs to write to data dirs
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: init-script
          configMap:
            name: mongodb-init-script

      # ── Restart policy ────────────────────────────────────────────────
      restartPolicy: Always

      # ── Image pull secret (from Docker Hub) ───────────────────────────
      imagePullSecrets:
        - name: regcred

  # ── Persistent volume claims (one per pod, managed by StatefulSet) ────────
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: mongo-config
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
