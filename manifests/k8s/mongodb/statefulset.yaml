apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: banking
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "7.0.15"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: mongodb-headless
  # 3-node replica set — provides automatic failover and read scaling.
  # The pod index (0,1,2) maps to rs0 member priority (primary is mongo-0).
  # Dev overlay patches this back to 1 to save resources.
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: dtb-banking-portal
        app.kubernetes.io/component: database
        app.kubernetes.io/version: "7.0.15"
    spec:
      # Spread replicas across availability zones for HA.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb

      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      initContainers:
        - name: fix-data-dir-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /data/db /data/configdb"]
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /data/configdb
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"

      containers:
        - name: mongodb
          # Pinned to full patch version — update intentionally, never floating.
          image: mongo:7.0.15
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP

          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--auth"

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: "banking_db"
            - name: MONGO_APP_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_APP_USER
            - name: MONGO_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_APP_PASSWORD

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /data/configdb
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/mongo-init.js
              subPath: mongo-init.js
              readOnly: true

          livenessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                # Ready only when this node is primary or a healthy secondary.
                - "rs.status().myState === 1 || rs.status().myState === 2"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: init-script
          configMap:
            name: mongodb-init-script

      restartPolicy: Always

      imagePullSecrets:
        - name: regcred

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: database
      spec:
        storageClassName: banking-retain
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: mongo-config
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: database
      spec:
        storageClassName: banking-retain
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
