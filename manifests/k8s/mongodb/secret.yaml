# =============================================================================
# mongodb/secret.yaml — MongoDB credentials (TEMPLATE)
#
# !! DO NOT commit real values. !!
# In the pipeline, this Secret is managed by External Secrets Operator (ESO),
# which pulls values from Vault. This file is a reference template only.
#
# To apply manually for local testing:
#   kubectl create secret generic mongodb-secret \
#     --from-literal=MONGO_ROOT_USER=root \
#     --from-literal=MONGO_ROOT_PASSWORD=<strong-password> \
#     --from-literal=MONGO_APP_USER=app_user \
#     --from-literal=MONGO_APP_PASSWORD=<strong-password> \
#     -n banking
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: banking
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: database
  annotations:
    # Managed by External Secrets Operator — do not edit manually in production
    managed-by: external-secrets
type: Opaque
stringData:
  MONGO_ROOT_USER: "root"                      # REPLACE or use ESO
  MONGO_ROOT_PASSWORD: "CHANGE_ME_ROOT"        # REPLACE or use ESO
  MONGO_APP_USER: "app_user"                   # REPLACE or use ESO
  MONGO_APP_PASSWORD: "CHANGE_ME_APP"          # REPLACE or use ESO
