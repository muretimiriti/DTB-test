---
# ExternalSecret — pulls Docker Hub registry credentials from Vault and
# creates the "regcred" imagePullSecret used by all pods in the banking namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: regcred
  namespace: banking
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: secrets-management
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 24h

  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore

  target:
    name: regcred
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # ESO will base64-encode the rendered .dockerconfigjson automatically
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: secret/data/banking/registry
        property: username

    - secretKey: password
      remoteRef:
        key: secret/data/banking/registry
        property: password
