---
# ClusterSecretStore — cluster-wide bridge between ESO and HashiCorp Vault.
# All ExternalSecrets in every namespace reference this store by name.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-cluster-secret-store
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: secrets-management
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"

      # Vault authentication via Kubernetes ServiceAccount token.
      # The Vault role "eso-banking" must exist and be bound to the
      # external-secrets ServiceAccount in the external-secrets namespace.
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-banking"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"

  # Retry policy — ESO will backoff and retry if Vault is temporarily unreachable
  retrySettings:
    maxRetries: 5
    retryInterval: "10s"

  # Health-check: ESO periodically validates the store is reachable
  conditions:
    - type: Ready
      status: "True"
