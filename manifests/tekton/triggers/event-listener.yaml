apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: banking-event-listener
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: tekton-trigger
spec:
  serviceAccountName: tekton-pipeline-sa

  triggers:
    - name: push-to-main
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: webhook-secret
            - name: eventTypes
              value: ["push"]
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/main'"
      bindings:
        - ref: push-trigger-binding
      template:
        ref: ci-trigger-template

    - name: pull-request
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: webhook-secret
            - name: eventTypes
              value: ["pull_request"]
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.action in ['opened', 'synchronize', 'reopened']"
      bindings:
        - ref: pr-trigger-binding
      template:
        ref: ci-trigger-template
