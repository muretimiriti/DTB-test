# =============================================================================
# rbac/serviceaccount.yaml — ServiceAccount for Tekton pipeline runs
#
# This SA is used by all TaskRuns and PipelineRuns.
# It has access to:
#   - Docker Hub credentials (regcred secret)
#   - Git credentials (git-credentials secret)
#   - Vault token for secrets (vault-token secret)
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-pipeline-sa
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: tekton-rbac
secrets:
  - name: regcred           # Docker Hub image push credentials
  - name: git-credentials   # GitHub token for manifest repo commits
