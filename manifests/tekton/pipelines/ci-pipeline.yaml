apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: banking-ci-pipeline
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: tekton-pipeline
spec:
  description: >
    Full CI pipeline for the DTB Banking Portal. Runs lint, SAST, tests,
    image build, security scanning, image signing, and GitOps manifest update.

  workspaces:
    - name: pipeline-workspace
      description: Shared workspace for source code and artefacts
    - name: docker-credentials
      description: Docker Hub credentials for kaniko

  params:
    - name: git-url
      type: string
      description: Source repository URL
    - name: git-revision
      type: string
      default: "main"
      description: Git branch, tag, or commit SHA to build
    - name: image-tag
      type: string
      description: Tag for built images (usually the git commit SHA)
    - name: image-repo
      type: string
      default: "muretimiriti/dtb-project"
      description: Docker Hub repo (e.g. muretimiriti/dtb-project)
    - name: docker-username
      type: string
      default: ""
      description: Docker Hub username (deprecated — use image-repo)
    - name: fail-on-audit
      type: string
      default: "true"
    - name: skip-sonarqube
      type: string
      default: "true"

  results:
    - name: backend-image-digest
      value: $(tasks.build-push.results.backend-image-digest)
    - name: frontend-image-digest
      value: $(tasks.build-push.results.frontend-image-digest)

  tasks:

    - name: git-clone
      taskRef:
        resolver: hub
        params:
          - name: catalog
            value: tekton-catalog-tasks
          - name: type
            value: artifact
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: version
            value: "0.9"
      workspaces:
        - name: output
          workspace: pipeline-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    - name: lint-sast
      taskRef:
        name: lint-sast
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: fail-on-audit
          value: $(params.fail-on-audit)

    - name: sonarqube-scan
      taskRef:
        name: sonarqube-scan
      runAfter: [git-clone]
      when:
        - input: $(params.skip-sonarqube)
          operator: in
          values: ["false"]
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: git-branch
          value: $(params.git-revision)

    - name: test-backend
      taskRef:
        name: test-backend
      runAfter: [lint-sast]
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: test-frontend
      taskRef:
        name: test-frontend
      runAfter: [lint-sast]
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: build-push
      taskRef:
        name: build-push
      runAfter: [test-backend, test-frontend]
      workspaces:
        - name: source
          workspace: pipeline-workspace
        - name: docker-credentials
          workspace: docker-credentials
      params:
        - name: docker-username
          value: $(params.docker-username)
        - name: image-tag
          value: $(params.image-tag)

    - name: trivy-scan
      taskRef:
        name: trivy-scan
      runAfter: [build-push]
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: docker-username
          value: $(params.docker-username)
        - name: image-tag
          value: $(params.image-tag)

    - name: cosign-sign
      taskRef:
        name: cosign-sign
      runAfter: [trivy-scan]
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: docker-username
          value: $(params.docker-username)
        - name: image-tag
          value: $(params.image-tag)

    - name: update-manifests
      taskRef:
        name: update-manifests
      runAfter: [cosign-sign]
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: image-repo
          value: $(params.image-repo)
        - name: image-tag
          value: $(params.image-tag)

  finally:
    - name: notify-status
      taskRef:
        resolver: hub
        params:
          - name: name
            value: send-to-webhook-http
          - name: version
            value: "0.1"
      params:
        - name: url
          value: "http://webhook-sink.tekton-pipelines.svc.cluster.local"
        - name: data
          value: '{"pipeline":"banking-ci-pipeline","status":"$(tasks.status)","tag":"$(params.image-tag)"}'
