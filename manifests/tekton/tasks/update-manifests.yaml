apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-manifests
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: tekton-task
spec:
  description: >
    Pins the new image tags in the correct Kustomize environment overlay and
    pushes the commit to git. ArgoCD detects the change and syncs the target
    environment automatically.

    CI builds write to manifests/environments/dev/.
    CD promotions write to manifests/environments/prod/ (after staging gate).

  workspaces:
    - name: source
      description: Checked-out source (contains manifests/environments/)

  params:
    - name: environment
      type: string
      default: "dev"
      description: |
        Target environment overlay to update.
        Must match a directory under manifests/environments/:
          dev     — updated on every CI build from main
          staging — updated after dev smoke tests pass
          prod    — updated by the CD pipeline after staging gate

    - name: backend-image
      type: string
      default: "muretimiriti/dtb-project-backend"
      description: Full backend image name (without tag) — must match the
        'name:' key in the target kustomization.yaml

    - name: frontend-image
      type: string
      default: "muretimiriti/dtb-project-frontend"
      description: Full frontend image name (without tag) — must match the
        'name:' key in the target kustomization.yaml

    - name: image-tag
      type: string
      description: New image tag (git commit SHA from build-push task)

    - name: git-user-name
      type: string
      default: "Tekton Pipeline"

    - name: git-user-email
      type: string
      default: "tekton@dtb.local"

  steps:
    - name: kustomize-set-image
      image: alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: GIT_TOKEN
              optional: true
        - name: REPO_URL
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: repo-url
              optional: true
      script: |
        #!/usr/bin/env sh
        set -eu

        ENV="$(params.environment)"
        OVERLAY="manifests/environments/${ENV}"

        if [ ! -d "$OVERLAY" ]; then
          echo "ERROR: overlay directory '$OVERLAY' does not exist."
          echo "Valid values for 'environment' param: dev, staging, prod"
          exit 1
        fi

        git config user.name  "$(params.git-user-name)"
        git config user.email "$(params.git-user-email)"

        echo "=== Installing kustomize ==="
        wget -qO /tmp/kustomize.tar.gz \
          https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
        tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
        chmod +x /usr/local/bin/kustomize

        echo "=== Pinning image tags in ${OVERLAY} ==="
        echo "    backend:  $(params.backend-image):$(params.image-tag)"
        echo "    frontend: $(params.frontend-image):$(params.image-tag)"

        cd "$OVERLAY"

        # kustomize edit set image requires the name to exactly match the
        # 'name:' key already present in kustomization.yaml — both are
        # muretimiriti/dtb-project-{backend,frontend}.
        kustomize edit set image \
          "$(params.backend-image)=$(params.backend-image):$(params.image-tag)"

        kustomize edit set image \
          "$(params.frontend-image)=$(params.frontend-image):$(params.image-tag)"

        # Validate the overlay builds cleanly before committing.
        kustomize build . > /dev/null
        echo "Kustomize build: OK"

        cd "$(workspaces.source.path)"
        git add "${OVERLAY}/kustomization.yaml"

        if git diff --staged --quiet; then
          echo "No changes — image tag $(params.image-tag) already set in ${ENV}"
          exit 0
        fi

        git commit -m "$(printf \
          'ci(%s): pin images to %s\n\nbackend:  %s:%s\nfrontend: %s:%s\n\n[skip ci]' \
          "$ENV" \
          "$(params.image-tag)" \
          "$(params.backend-image)" "$(params.image-tag)" \
          "$(params.frontend-image)" "$(params.image-tag)")"

        REMOTE="${REPO_URL:-$(git remote get-url origin 2>/dev/null || echo '')}"

        if [ -n "${GIT_TOKEN:-}" ] && echo "$REMOTE" | grep -q "^https://"; then
          echo "=== Pushing with token auth ==="
          AUTHED="$(echo "$REMOTE" | sed 's|https://|https://x-token:'"${GIT_TOKEN}"'@|')"
          git push "$AUTHED" HEAD
        elif git remote get-url origin 2>/dev/null | grep -q "^git@"; then
          echo "=== Pushing with SSH ==="
          git push origin HEAD
        else
          echo "WARNING: no GIT_TOKEN found — skipping git push."
          echo "  Add GIT_TOKEN to the git-credentials secret to enable write-back."
          exit 0
        fi

        echo "=== ${ENV} overlay updated — ArgoCD will sync dtb-banking-${ENV} ==="
