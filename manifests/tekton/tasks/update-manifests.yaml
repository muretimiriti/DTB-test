
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-manifests
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: tekton-task
spec:
  description: >
    Updates the Kustomize image tags in the manifests repository and commits
    the change. ArgoCD picks up the commit and syncs the cluster.

  workspaces:
    - name: source
      description: Checked-out source (contains manifests/k8s/)

  params:
    - name: image-repo
      type: string
      default: "muretimiriti/dtb-project"
      description: Docker Hub repo (e.g. muretimiriti/dtb-project)
    - name: image-tag
      type: string
      description: New image tag (git commit SHA or timestamp)
    - name: git-user-name
      type: string
      default: "Tekton Pipeline"
    - name: git-user-email
      type: string
      default: "tekton@dtb.local"

  steps:
    - name: kustomize-set-image
      image: alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: GIT_TOKEN
              optional: true
        - name: REPO_URL
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: repo-url
              optional: true
      script: |
        set -e

        git config user.name "$(params.git-user-name)"
        git config user.email "$(params.git-user-email)"

        echo "=== Installing kustomize ==="
        wget -qO /tmp/kustomize.tar.gz \
          https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
        tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
        chmod +x /usr/local/bin/kustomize

        echo "=== Updating image tags to $(params.image-tag) ==="
        cd manifests/k8s

        kustomize edit set image \
          "$(params.image-repo)-backend=$(params.image-repo)-backend:$(params.image-tag)"

        kustomize edit set image \
          "$(params.image-repo)-frontend=$(params.image-repo)-frontend:$(params.image-tag)"

        kustomize build . > /dev/null
        echo "Kustomize build: OK"

        git add kustomization.yaml
        if git diff --staged --quiet; then
          echo "No changes to commit — image tag already up to date"
          exit 0
        fi

        COMMIT_MSG=$(printf 'ci: update image tags to %s\n\nBackend:  %s-backend:%s\nFrontend: %s-frontend:%s\n\nskip ci' \
          "$(params.image-tag)" \
          "$(params.image-repo)" "$(params.image-tag)" \
          "$(params.image-repo)" "$(params.image-tag)")
        git commit -m "$COMMIT_MSG"

        REMOTE="${REPO_URL:-$(git remote get-url origin 2>/dev/null || echo '')}"

        if [ -n "${GIT_TOKEN:-}" ] && echo "$REMOTE" | grep -q "^https://"; then
          echo "=== Pushing with token auth ==="
          AUTHED="$(echo "$REMOTE" | sed 's|https://|https://x-token:'"${GIT_TOKEN}"'@|')"
          git push "$AUTHED" HEAD
        elif git remote get-url origin 2>/dev/null | grep -q "^git@"; then
          echo "=== Pushing with SSH ==="
          git push origin HEAD
        else
          echo "=== No GIT_TOKEN in git-credentials secret — skipping git push ==="
          echo "    GitOps image tag update will not be committed."
          echo "    To enable: add GIT_TOKEN key to the git-credentials secret."
          exit 0
        fi

        echo "=== Manifest update pushed — ArgoCD will sync automatically ==="
