---
# Nginx Ingress Controller — installed into the ingress-nginx namespace.
# Deployed via the official Helm chart values; the controller watches all
# namespaces and processes Ingress objects with ingressClassName: nginx.
#
# For minikube: run `minikube addons enable ingress` instead of this file.
# For a bare-metal / cloud cluster: apply this manifest then wait for the
# LoadBalancer Service to get an external IP.
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: platform
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
# IngressClass — ties Ingress objects to the Nginx controller.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
    argocd.argoproj.io/sync-wave: "-1"
spec:
  controller: k8s.io/ingress-nginx
