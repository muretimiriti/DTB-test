---
# StorageClass — standard-rwo is the default for single-node PVCs (minikube / k3s).
# On cloud providers replace provisioner with the cloud-native driver
# (e.g., ebs.csi.aws.com, disk.csi.azure.com, pd.csi.storage.gke.io).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-rwo
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: platform
provisioner: k8s.io/minikube-hostpath
reclaimPolicy: Retain          # Keep PVs on PVC deletion — protects database data
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
