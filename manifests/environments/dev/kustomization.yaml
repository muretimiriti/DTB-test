apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Dev overlay ────────────────────────────────────────────────────────────────
# Inherits all resources from the base, then applies dev-specific patches.
# Images are pinned to :replace-me so the Tekton pipeline can write the real
# commit-SHA tag on every build.
# ───────────────────────────────────────────────────────────────────────────────

namespace: banking-dev

resources:
  - ../../k8s

namePrefix: dev-

commonLabels:
  environment: dev
  app.kubernetes.io/environment: dev

# ── Replica counts ─────────────────────────────────────────────────────────────
# Dev runs single replicas to keep resource usage low.
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: banking-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: banking-frontend

  # ── Resource limits (relaxed for dev) ────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
    target:
      kind: Deployment
      name: banking-backend

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "25m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
    target:
      kind: Deployment
      name: banking-frontend

  # ── Ingress host (dev) ────────────────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: banking-dev.local
    target:
      kind: Ingress
      name: banking-ingress

# ── Image tags ─────────────────────────────────────────────────────────────────
# Tekton update-manifests task overwrites these on every build.
images:
  - name: DOCKERHUB_USERNAME/banking-backend
    newName: DOCKERHUB_USERNAME/banking-backend
    newTag: replace-me
  - name: DOCKERHUB_USERNAME/banking-frontend
    newName: DOCKERHUB_USERNAME/banking-frontend
    newTag: replace-me
