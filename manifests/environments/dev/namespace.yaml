apiVersion: v1
kind: Namespace
metadata:
  name: banking-dev
  labels:
    app.kubernetes.io/part-of: dtb-banking-portal
    environment: dev
    # Enforces baseline pod-security standards in this namespace.
    # 'baseline' blocks known privilege escalations without restricting
    # legitimate workloads; appropriate for a non-production environment.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
