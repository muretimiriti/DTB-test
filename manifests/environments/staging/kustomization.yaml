apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Staging overlay ─────────────────────────────────────────────────────────────
# Mirrors production sizing at 50% to catch integration issues before promotion.
# The CD pipeline runs smoke tests here before promoting to prod.
# ────────────────────────────────────────────────────────────────────────────────

namespace: banking-staging

resources:
  - ../../k8s
  - namespace.yaml

namePrefix: staging-

commonLabels:
  environment: staging
  app.kubernetes.io/environment: staging

# ── Replica counts ──────────────────────────────────────────────────────────────
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: banking-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: banking-frontend

  # ── Resource limits (staging ≈ prod) ─────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
    target:
      kind: Deployment
      name: banking-backend

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
    target:
      kind: Deployment
      name: banking-frontend

  # ── CORS origins (staging) ───────────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /data/ALLOWED_ORIGINS
        value: "https://banking-staging.yourdomain.com"
    target:
      kind: ConfigMap
      name: backend-config

  # ── Ingress host + TLS (staging) ─────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: banking-staging.yourdomain.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: banking-staging.yourdomain.com
      - op: replace
        path: /spec/tls/0/secretName
        value: banking-staging-tls
    target:
      kind: Ingress
      name: banking-ingress

# ── Image tags ─────────────────────────────────────────────────────────────────
images:
  # Tekton CD pipeline writes the verified dev tag here after smoke tests pass.
  - name: muretimiriti/dtb-project-backend
    newName: muretimiriti/dtb-project-backend
    newTag: replace-me
  - name: muretimiriti/dtb-project-frontend
    newName: muretimiriti/dtb-project-frontend
    newTag: replace-me
