
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dtb-banking-gitops
  namespace: argocd
  labels:
    app.kubernetes.io/name: dtb-banking-gitops
    app.kubernetes.io/part-of: dtb-banking-portal
    app.kubernetes.io/component: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: "${REPO_URL}"
    targetRevision: HEAD
    # Points at the gitops layer, not the app manifests directly.
    path: manifests/gitops

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false      # argocd namespace must already exist
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
