
# Development override - adds hot-reload and exposes ports for debugging

services:
  mongodb:
    ports:
      - "27017:27017"

  backend:
    build:
      target: deps
    command: ["npx", "nodemon", "src/server.js"]
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
    ports:
      - "5000:5000"
    read_only: false

  frontend:
    build:
      context: ./frontend
      target: builder
    command: ["npm", "start"]
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    environment:
      REACT_APP_API_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    read_only: false
